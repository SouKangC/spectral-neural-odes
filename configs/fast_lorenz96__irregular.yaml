exp_id: fast_lorenz96__irregular
model:
  name: lsa_node
  in_dim: 8
  out_dim: 8
  hidden_dim: 64
  n_fft: 16
  hop_length: 4
  d_att: 64
  n_heads: 4
  time_emb_dim: 16
  encoder_hidden: 64
  decoder_hidden: 64
  solver: dopri5
  rtol: 1.0e-3
  atol: 1.0e-4
  use_adjoint: false
  mlp_dim: 128
train:
  epochs: 300
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 0.0
  grad_clip: 1.0
  log_every: 20
data:
  name: lorenz96
  sampling: irregular
  in_len: 30
  out_len: 30
  train_frac: 0.8
  irregular_keep_rate: 0.3
  n_dim: 8
  n_points: 2000
  t_max: 20.0

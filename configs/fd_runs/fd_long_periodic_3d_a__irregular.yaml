exp_id: fd_long_periodic_3d_a__irregular
model:
  name: faithful_diffode
  in_dim: 3
  out_dim: 3
  hidden_dim: 64
  mlp_dim: 64
  time_emb_dim: 16
  encoder_hidden: 64
  solver: dopri5
  rtol: 0.001
  atol: 0.0001
  use_adjoint: false
train:
  epochs: 1000
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  log_every: 20
data:
  name: periodic_3d_a
  sampling: irregular
  in_len: 30
  out_len: 30
  train_frac: 0.8
  amp: 0.05
  n_points: 1000
  t_max: 20.0
  irregular_keep_rate: 0.3
